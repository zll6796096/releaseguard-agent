<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Gemini Store</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Secure Checkout</h1>
      <p class="subtitle">Complete your purchase below</p>
      
      <div class="product-detail">
        <span class="product-name">AI Developer Assistant Pro</span>
        <span class="product-price">$99/mo</span>
      </div>

      <form action="/checkout" method="POST">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="john@example.com">
        </div>

        <div class="form-group">
          <label for="card">Card Number</label>
          <input type="text" id="card" name="card" required placeholder="4111 1111 1111 1111">
        </div>

        <!-- Simulate hidden checkout regression check by adding this comment -->
        <button 
          type="submit" 
          data-testid="checkout-button" 
          class="btn-primary {% if hide_button %}hidden-button{% endif %}"
          id="checkout-btn"
        >
          Pay $99.00
        </button>
      </form>
    </div>
    <div class="footer">
      ReleaseGuard Agent Hackathon MVP Demo App
    </div>
  </div>
</body>
</html>
