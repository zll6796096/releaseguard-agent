<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
<rect width="1920" height="1080" fill="#F6F7F9"/>
<style>
text { font-family: "Yu Gothic", "Hiragino Sans", sans-serif; fill: #101828; }
.h { font-size: 54px; font-weight: 700; }
.k { font-size: 24px; font-weight: 700; fill: #0F766E; }
.s { font-size: 28px; fill: #667085; }
.box { fill: white; stroke: #D0D5DD; stroke-width: 3; rx: 8; }
.label { font-size: 27px; font-weight: 700; }
.body { font-size: 23px; }
.note { font-size: 23px; fill: #667085; }
.arrow { stroke: #17233D; stroke-width: 5; marker-end: url(#arrow); fill: none; }
</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#17233D"/></marker></defs>
