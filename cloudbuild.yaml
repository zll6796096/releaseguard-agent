steps:
  - id: test-demo
    name: python:3.12
    entrypoint: bash
    args:
      - -ceu
      - |
        pip install --disable-pip-version-check -r apps/demo_store/requirements.txt
        PYTHONPATH=apps/demo_store pytest apps/demo_store/tests -v

  - id: test-agent
    name: python:3.12
    entrypoint: bash
    args:
      - -ceu
      - |
        pip install --disable-pip-version-check -r apps/releaseguard/requirements.txt
        PYTHONPATH=apps/releaseguard pytest apps/releaseguard/tests -v
        python scripts/test_cloudbuild_config.py

  - id: build-demo
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --label=org.opencontainers.image.revision=${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_DEMO_SERVICE}:${COMMIT_SHA}
      - apps/demo_store
    waitFor: [test-demo]

  - id: build-agent
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --label=org.opencontainers.image.revision=${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_AGENT_SERVICE}:${COMMIT_SHA}
      - apps/releaseguard
    waitFor: [test-agent]

  - id: push-demo
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_DEMO_SERVICE}:${COMMIT_SHA}
    waitFor: [build-demo]

  - id: push-agent
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_AGENT_SERVICE}:${COMMIT_SHA}
    waitFor: [build-agent]

  - id: deploy-candidates
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        tag="candidate-${SHORT_SHA}"
        previous_demo_revision="$$(gcloud run services describe "${_DEMO_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format='value(status.traffic[percent=100].revisionName)')"
        previous_agent_revision="$$(gcloud run services describe "${_AGENT_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format='value(status.traffic[percent=100].revisionName)')"
        printf 'previous_demo_revision=%q\nprevious_agent_revision=%q\n' \
          "$$previous_demo_revision" "$$previous_agent_revision" \
          > /workspace/releaseguard-previous-traffic.env

        gcloud run deploy "${_DEMO_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_DEMO_SERVICE}:${COMMIT_SHA}" \
          --no-traffic \
          --tag="$$tag" \
          --update-labels="app=releaseguard,managed-by=cloud-build,source-commit=${COMMIT_SHA}" \
          --update-env-vars=BUG_HIDE_CHECKOUT_BUTTON=false

        gcloud run deploy "${_AGENT_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_AGENT_SERVICE}:${COMMIT_SHA}" \
          --no-traffic \
          --tag="$$tag" \
          --memory=2Gi \
          --cpu=2 \
          --update-labels="app=releaseguard,managed-by=cloud-build,source-commit=${COMMIT_SHA}" \
          --remove-env-vars=GEMINI_API_KEY,RELEASEGUARD_SHARED_TOKEN \
          --update-secrets=GEMINI_API_KEY=releaseguard-gemini-api-key:latest,RELEASEGUARD_SHARED_TOKEN=releaseguard-shared-token:latest

        candidate_demo_revision="$$(gcloud run services describe "${_DEMO_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format="value(status.traffic[tag=$$tag].revisionName)")"
        candidate_agent_revision="$$(gcloud run services describe "${_AGENT_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format="value(status.traffic[tag=$$tag].revisionName)")"
        test -n "$$candidate_demo_revision"
        test -n "$$candidate_agent_revision"
        printf 'candidate_demo_revision=%q\ncandidate_agent_revision=%q\n' \
          "$$candidate_demo_revision" "$$candidate_agent_revision" \
          > /workspace/releaseguard-candidate-revisions.env
    waitFor: [push-demo, push-agent]

  - id: evaluate-candidates
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        tag="candidate-${SHORT_SHA}"
        demo_url="$$(gcloud run services describe "${_DEMO_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format="value(status.traffic[tag=$$tag].url)")"
        agent_url="$$(gcloud run services describe "${_AGENT_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format="value(status.traffic[tag=$$tag].url)")"
        test -n "$$demo_url"
        test -n "$$agent_url"

        token="$$(gcloud secrets versions access latest \
          --secret=releaseguard-shared-token \
          --project="$PROJECT_ID")"
        trap 'unset token' EXIT
        curl -fsS --retry 8 --retry-all-errors --retry-delay 5 \
          "$$demo_url/healthz/" | grep -q '"status":"ok"'
        curl -fsS "$$demo_url/" >/dev/null
        curl -fsS --retry 8 --retry-all-errors --retry-delay 5 \
          "$$agent_url/healthz/" | grep -q '"status":"ok"'
        curl -fsS "$$agent_url/openapi.json" >/dev/null
        payload="{\"repo\":\"zll6796096/releaseguard-agent\",\"pr_number\":0,\"commit_sha\":\"${COMMIT_SHA}\",\"preview_url\":\"$${demo_url}\",\"changed_files\":[],\"diff_text\":\"\"}"
        unauthorized_status="$$(curl -sS -o /dev/null -w '%{http_code}' \
          -H "Content-Type: application/json" \
          -d "$$payload" \
          "$$agent_url/evaluate")"
        test "$$unauthorized_status" = "401"
        curl -fsS \
          -H "Authorization: Bearer $$token" \
          -H "Content-Type: application/json" \
          -d "$$payload" \
          "$$agent_url/evaluate" > /workspace/releaseguard-candidate.json
        unset token
        trap - EXIT
        python3 - <<'PY'
        import json
        from pathlib import Path

        result = json.loads(Path("/workspace/releaseguard-candidate.json").read_text())
        assert result["verdict"] == "APPROVE", result
        assert isinstance(result["evidence"], list) and result["evidence"], result
        why = result["gemini_judgement"]["why"].lower()
        assert "fallback activated" not in why, result["gemini_judgement"]
        print("candidate verdict", result["verdict"], "risk", result["overall_risk"])
        PY
    waitFor: [deploy-candidates]

  - id: promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/releaseguard-previous-traffic.env
        source /workspace/releaseguard-candidate-revisions.env

        remote_main="$$(curl -fsS \
          https://api.github.com/repos/zll6796096/releaseguard-agent/commits/main |
          python3 -c 'import json, sys; print(json.load(sys.stdin)["sha"])')"
        test "$$remote_main" = "${COMMIT_SHA}"

        current_demo_revision="$$(gcloud run services describe "${_DEMO_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format='value(status.traffic[percent=100].revisionName)')"
        current_agent_revision="$$(gcloud run services describe "${_AGENT_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format='value(status.traffic[percent=100].revisionName)')"
        test "$$current_demo_revision" = "$$previous_demo_revision"
        test "$$current_agent_revision" = "$$previous_agent_revision"

        rollback() {
          gcloud run services update-traffic "${_AGENT_SERVICE}" \
            --project="$PROJECT_ID" --region="${_REGION}" \
            --to-revisions="$$previous_agent_revision=100" || true
          gcloud run services update-traffic "${_DEMO_SERVICE}" \
            --project="$PROJECT_ID" --region="${_REGION}" \
            --to-revisions="$$previous_demo_revision=100" || true
        }
        trap rollback ERR
        gcloud run services update-traffic "${_DEMO_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --to-revisions="$$candidate_demo_revision=100"
        gcloud run services update-traffic "${_AGENT_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --to-revisions="$$candidate_agent_revision=100"
        trap - ERR
    waitFor: [evaluate-candidates]

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: apps
  _DEMO_SERVICE: demo-store
  _AGENT_SERVICE: releaseguard-agent

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_DEMO_SERVICE}:${COMMIT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_AGENT_SERVICE}:${COMMIT_SHA}
