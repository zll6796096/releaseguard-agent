steps:
  - id: test-demo
    name: python:3.12
    entrypoint: bash
    args:
      - -ceu
      - |
        pip install --disable-pip-version-check -r apps/demo_store/requirements.txt
        PYTHONPATH=apps/demo_store pytest apps/demo_store/tests -v

  - id: test-agent
    name: python:3.12
    entrypoint: bash
    args:
      - -ceu
      - |
        pip install --disable-pip-version-check -r apps/releaseguard/requirements.txt
        PYTHONPATH=apps/releaseguard pytest apps/releaseguard/tests -v
        PYTHONPATH=scripts pytest scripts/test_releaseguard_cloudbuild.py -v
        python scripts/test_cloudbuild_config.py

  - id: build-demo
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --label=org.opencontainers.image.revision=${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_DEMO_SERVICE}:${COMMIT_SHA}
      - apps/demo_store
    waitFor: [test-demo]

  - id: build-agent
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --label=org.opencontainers.image.revision=${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_AGENT_SERVICE}:${COMMIT_SHA}
      - apps/releaseguard
    waitFor: [test-agent]

  - id: push-demo
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_DEMO_SERVICE}:${COMMIT_SHA}
    waitFor: [build-demo]

  - id: push-agent
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_AGENT_SERVICE}:${COMMIT_SHA}
    waitFor: [build-agent]

  - id: deploy-candidates
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        cleanup_candidates() {
          python3 scripts/releaseguard_cloudbuild.py cleanup \
            --project="$PROJECT_ID" \
            --region="${_REGION}" \
            --demo-service="${_DEMO_SERVICE}" \
            --agent-service="${_AGENT_SERVICE}" \
            --tag="candidate-${SHORT_SHA}"
        }
        cleanup_on_error() {
          trap - ERR
          cleanup_candidates
        }
        trap cleanup_on_error ERR
        python3 scripts/releaseguard_cloudbuild.py deploy \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --demo-service="${_DEMO_SERVICE}" \
          --agent-service="${_AGENT_SERVICE}" \
          --commit="${COMMIT_SHA}" \
          --tag="candidate-${SHORT_SHA}" \
          --demo-image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_DEMO_SERVICE}:${COMMIT_SHA}" \
          --agent-image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_AGENT_SERVICE}:${COMMIT_SHA}"
        trap - ERR
    waitFor: [push-demo, push-agent]

  - id: evaluate-candidates
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        cleanup_candidates() {
          python3 scripts/releaseguard_cloudbuild.py cleanup \
            --project="$PROJECT_ID" \
            --region="${_REGION}" \
            --demo-service="${_DEMO_SERVICE}" \
            --agent-service="${_AGENT_SERVICE}" \
            --tag="candidate-${SHORT_SHA}"
        }
        trap cleanup_candidates EXIT
        python3 scripts/releaseguard_cloudbuild.py evaluate \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --demo-service="${_DEMO_SERVICE}" \
          --agent-service="${_AGENT_SERVICE}"
    waitFor: [deploy-candidates]

  - id: promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        python3 scripts/releaseguard_cloudbuild.py promote \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --demo-service="${_DEMO_SERVICE}" \
          --agent-service="${_AGENT_SERVICE}"
    waitFor: [evaluate-candidates]

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: apps
  _DEMO_SERVICE: demo-store
  _AGENT_SERVICE: releaseguard-agent

timeout: 1800s

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_DEMO_SERVICE}:${COMMIT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_AGENT_SERVICE}:${COMMIT_SHA}
